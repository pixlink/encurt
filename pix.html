<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pix - QR Code</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; text-align: center; }
    #qrcode { display: inline-block; padding: 14px; background: #fff; border: 1px solid #eee; border-radius: 12px; }
    #qrImg { width: 256px; height: 256px; display:block; }
    #pedidoBox { margin-top: 14px; font-size: 16px; font-weight: 600; }
    button { margin-top: 16px; padding: 12px 16px; font-size: 15px; cursor: pointer; }
    .box { margin-top: 18px; text-align: left; background: #f7f7f7; padding: 12px; border-radius: 10px; overflow-wrap: anywhere; }
    .muted { color: #666; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Pagamento via Pix</h1>

  <div id="qrcode">
    <img id="qrImg" alt="QR Code Pix" />
  </div>

  <div id="pedidoBox" style="display:none;"></div>

  <div>
    <button id="copy">Clique para copiar o código copia e cola</button>
  </div>

  <div class="box">
    <b>Código copia e cola:</b>
    <div id="pixText" style="margin-top:8px;"></div>
  </div>

  <p class="muted">Se você recebeu este link, basta abrir e escanear o QR Code.</p>

  <script>
    const elPixText = document.getElementById('pixText');
    const btnCopy = document.getElementById('copy');
    const elPedidoBox = document.getElementById('pedidoBox');
    const qrImg = document.getElementById('qrImg');

    // Pedido opcional
    const params = new URLSearchParams(window.location.search);
    const pedido = (params.get('pedido') || '').trim();
    if (pedido) {
      elPedidoBox.textContent = `Número do pedido: ${pedido}`;
      elPedidoBox.style.display = 'block';
    }

    // Pix no hash
    const rawHash = (window.location.hash || '').replace(/^#/, '').trim();

    if (!rawHash) {
      elPixText.textContent = 'Nenhum Pix informado na URL.';
      btnCopy.disabled = true;
    } else {
      let pix = '';
      try {
        pix = decodeURIComponent(rawHash).trim();
      } catch {
        elPixText.textContent = 'Não foi possível ler o Pix a partir do link.';
        btnCopy.disabled = true;
      }

      if (pix) {
        elPixText.textContent = pix;

        // QR via Google Charts
        const qrUrl =
          "https://chart.googleapis.com/chart?cht=qr&chs=256x256&chld=M|0&chl=" +
          encodeURIComponent(pix);

        qrImg.src = qrUrl;
        qrImg.onerror = () => {
          elPixText.textContent = pix;
          // Se até o Google Charts for bloqueado, o QR não aparece, mas o pix continua copiável.
        };

        btnCopy.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(pix);
            btnCopy.textContent = 'Copiado!';
            setTimeout(() => btnCopy.textContent = 'Clique para copiar o código copia e cola', 1200);
          } catch {
            const ta = document.createElement('textarea');
            ta.value = pix;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            btnCopy.textContent = 'Copiado!';
            setTimeout(() => btnCopy.textContent = 'Clique para copiar o código copia e cola', 1200);
          }
        });
      }
    }
  </script>
</body>
</html>

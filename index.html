<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerar link do Pix</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#fff; color:#111; }
    .wrap { max-width: 900px; margin: 40px auto; padding: 0 18px; }
    h1 { font-size: 36px; margin: 0 0 18px; }
    label { display:block; font-weight: 700; margin: 18px 0 8px; }
    textarea, input { width:100%; box-sizing:border-box; padding: 12px; border:1px solid #cfcfd8; border-radius: 8px; font-size: 14px; }
    textarea { min-height: 140px; resize: vertical; }
    .row { display:flex; gap:12px; align-items:center; margin-top: 14px; flex-wrap:wrap; }
    button { padding: 10px 14px; border-radius: 8px; border:1px solid #111; background:#fff; cursor:pointer; font-weight:700; }
    button.primary { background:#111; color:#fff; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { color:#666; font-size: 13px; margin-top: 10px; }
    .out { margin-top: 18px; }
    .status { margin-top: 10px; font-size: 13px; color:#666; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Gerar link do Pix</h1>

    <label for="pix">Cole abaixo o seu Pix copia e cola (EMV):</label>
    <textarea id="pix" placeholder="Cole aqui o Pix copia e cola..."></textarea>

    <label for="pedido">Número/Código do pedido (opcional):</label>
    <input id="pedido" type="text" placeholder="Ex: 2107551226..." />

    <div class="row">
      <button id="gerar" class="primary">Gerar link encurtado</button>
      <button id="copiar" disabled>Copiar link</button>
      <button id="abrir" disabled>Abrir link</button>
    </div>

    <div class="hint">
      O link encurtado será gerado pelo Cloudflare Worker e vai abrir a página com o QR Code e o botão para copiar o Pix.
    </div>

    <div class="out">
      <label for="link">Link gerado:</label>
      <input id="link" readonly placeholder="O link aparecerá aqui..." />
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const pixEl = document.getElementById("pix");
    const pedidoEl = document.getElementById("pedido");
    const linkEl = document.getElementById("link");

    const gerarBtn = document.getElementById("gerar");
    const copiarBtn = document.getElementById("copiar");
    const abrirBtn = document.getElementById("abrir");

    const statusEl = document.getElementById("status");

    // URL do seu Cloudflare Worker (sem barra no final)
    const WORKER_BASE = "https://encurt.pixlink111.workers.dev";

    function setStatus(msg) {
      statusEl.textContent = msg || "";
    }

    function setButtonsEnabled(enabled) {
      copiarBtn.disabled = !enabled;
      abrirBtn.disabled = !enabled;
    }

    gerarBtn.addEventListener("click", async () => {
      const pix = (pixEl.value || "").replace(/\r/g, "").trim();
      const pedido = (pedidoEl.value || "").trim();

      if (!pix) {
        alert("Cole o Pix copia e cola.");
        return;
      }

      setButtonsEnabled(false);
      linkEl.value = "";
      setStatus("Gerando link...");

      let resp;
      try {
        resp = await fetch(WORKER_BASE + "/api/shorten", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pix, pedido }),
        });
      } catch {
        setStatus("");
        alert("Não consegui conectar no encurtador (Worker).");
        return;
      }

      let data;
      try {
        data = await resp.json();
      } catch {
        setStatus("");
        alert("O Worker não retornou JSON. Veja o console (F12).");
        return;
      }

      if (!data.ok) {
        setStatus("");
        alert("Erro: " + (data.error || "falha ao encurtar"));
        return;
      }

      linkEl.value = data.shortUrl;
      setButtonsEnabled(true);
      setStatus("Link encurtado gerado.");
    });

    copiarBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(linkEl.value);
        copiarBtn.textContent = "Copiado!";
        setTimeout(() => (copiarBtn.textContent = "Copiar link"), 1200);
      } catch {
        alert("Não consegui copiar automaticamente. Copie manualmente.");
      }
    });

    abrirBtn.addEventListener("click", () => {
      const link = (linkEl.value || "").trim();
      if (!link) return;
      window.open(link, "_blank", "noopener,noreferrer");
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerar link do Pix</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#fff; color:#111; }
    .wrap { max-width: 900px; margin: 40px auto; padding: 0 18px; }
    h1 { font-size: 36px; margin: 0 0 18px; }
    label { display:block; font-weight: 700; margin: 18px 0 8px; }
    textarea, input { width:100%; box-sizing:border-box; padding: 12px; border:1px solid #cfcfd8; border-radius: 8px; font-size: 14px; }
    textarea { min-height: 140px; resize: vertical; }
    .row { display:flex; gap:12px; align-items:center; margin-top: 14px; flex-wrap:wrap; }
    button { padding: 10px 14px; border-radius: 8px; border:1px solid #111; background:#fff; cursor:pointer; font-weight:700; }
    button.primary { background:#111; color:#fff; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { color:#666; font-size: 13px; margin-top: 10px; line-height: 1.35; }
    .out { margin-top: 18px; }
    .status { margin-top: 10px; font-size: 13px; color:#666; white-space: pre-wrap; }
    .small { font-size: 12px; color: #666; margin-top: 8px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Gerar link do Pix</h1>

    <label for="pix">Cole abaixo o seu Pix copia e cola (EMV):</label>
    <textarea id="pix" placeholder="Cole aqui o Pix copia e cola..."></textarea>

    <label for="pedido">Número/Código do pedido (opcional):</label>
    <input id="pedido" type="text" placeholder="Ex: 2107551226..." />

    <div class="row">
      <button id="gerar" class="primary">Gerar link encurtado (v.gd)</button>
      <button id="copiar" disabled>Copiar link</button>
      <button id="abrir" disabled>Abrir link</button>
    </div>

    <div class="hint">
      Este modo usa apenas o <b>v.gd</b> (sem Cloudflare).<br/>
      Observação: o v.gd pode mostrar uma página de aviso antes de redirecionar — isso é controlado pelo próprio v.gd.
    </div>

    <div class="out">
      <label for="link">Link gerado:</label>
      <input id="link" class="mono" readonly placeholder="O link aparecerá aqui..." />
      <div id="status" class="status"></div>

      <details class="small" style="margin-top:12px;">
        <summary>Ver URL de destino (antes de encurtar)</summary>
        <div style="margin-top:8px;">
          <input id="destino" class="mono" readonly placeholder="Destino aparecerá aqui..." />
        </div>
      </details>
    </div>
  </div>

  <script>
    const pixEl = document.getElementById("pix");
    const pedidoEl = document.getElementById("pedido");
    const linkEl = document.getElementById("link");
    const destinoEl = document.getElementById("destino");

    const gerarBtn = document.getElementById("gerar");
    const copiarBtn = document.getElementById("copiar");
    const abrirBtn = document.getElementById("abrir");

    const statusEl = document.getElementById("status");

    // Página final (seu site)
    const PIX_PAGE = "https://pixlink.github.io/encurt/pix.html";

    function setStatus(msg) {
      statusEl.textContent = msg || "";
    }

    function setButtonsEnabled(enabled) {
      copiarBtn.disabled = !enabled;
      abrirBtn.disabled = !enabled;
    }

    function normalizePix(pix) {
      // remove \r e trim (não mexe no conteúdo do EMV além disso)
      return (pix || "").toString().replace(/\r/g, "").trim();
    }

    function buildTargetUrl({ pix, pedido }) {
      const pedidoClean = (pedido || "").toString().trim();
      const pedidoPart = pedidoClean ? `?pedido=${encodeURIComponent(pedidoClean)}` : "";
      // pix vai no fragmento (#) como você já usa
      return `${PIX_PAGE}${pedidoPart}#${encodeURIComponent(pix)}`;
    }

    async function shortenWithVgd(longUrl) {
      // API "simple" do v.gd: devolve texto puro com a URL encurtada
      const api = "https://v.gd/create.php?format=simple&url=" + encodeURIComponent(longUrl);

      // Observação: isso é cross-origin; geralmente funciona porque v.gd libera.
      const resp = await fetch(api, { method: "GET" });

      const text = (await resp.text()).trim();

      if (!resp.ok) {
        // às vezes eles retornam 200 com erro em texto, então tratamos nos dois jeitos
        throw new Error(text || `HTTP ${resp.status}`);
      }

      if (text.startsWith("https://v.gd/") || text.startsWith("http://v.gd/")) {
        return text;
      }

      // quando dá erro, ele costuma devolver uma mensagem em texto
      throw new Error(text || "Resposta inesperada do v.gd");
    }

    gerarBtn.addEventListener("click", async () => {
      const pix = normalizePix(pixEl.value);
      const pedido = (pedidoEl.value || "").trim();

      if (!pix) {
        alert("Cole o Pix copia e cola.");
        return;
      }

      setButtonsEnabled(false);
      linkEl.value = "";
      destinoEl.value = "";
      setStatus("Montando URL de destino...");

      const targetUrl = buildTargetUrl({ pix, pedido });
      destinoEl.value = targetUrl;

      setStatus("Encurtando no v.gd...");
      gerarBtn.disabled = true;

      try {
        const shortUrl = await shortenWithVgd(targetUrl);
        linkEl.value = shortUrl;
        setButtonsEnabled(true);
        setStatus("Link encurtado gerado.");
      } catch (e) {
        setStatus("Falha ao encurtar no v.gd.\n\nDetalhe: " + (e?.message || e));
        alert("Não consegui encurtar no v.gd. Veja o detalhe abaixo do campo.");
      } finally {
        gerarBtn.disabled = false;
      }
    });

    copiarBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(linkEl.value);
        copiarBtn.textContent = "Copiado!";
        setTimeout(() => (copiarBtn.textContent = "Copiar link"), 1200);
      } catch {
        alert("Não consegui copiar automaticamente. Copie manualmente.");
      }
    });

    abrirBtn.addEventListener("click", () => {
      const link = (linkEl.value || "").trim();
      if (!link) return;
      window.open(link, "_blank", "noopener,noreferrer");
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerar link do Pix</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    textarea { width: 100%; min-height: 140px; padding: 12px; font-size: 14px; }
    button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    input[type="text"] { width: 100%; padding: 10px 12px; font-size: 14px; }
    .muted { color: #666; font-size: 13px; }
    .warn { color: #8a4b00; background: #fff3cd; padding: 10px 12px; border-radius: 10px; margin: 12px 0; display:none; }
  </style>
</head>
<body>
  <h1>Gerar link do Pix</h1>

  <div id="warn" class="warn"></div>

  <p>Cole abaixo o seu <b>Pix copia e cola</b> (EMV):</p>
  <textarea id="pix" placeholder="Cole aqui o Pix copia e cola..."></textarea>

  <div class="row">
    <button id="gerar">Gerar link público</button>
    <button id="copiarLink" disabled>Copiar link</button>
  </div>

  <p class="muted">O link vai abrir uma página com QR Code e botão para copiar o Pix.</p>

  <label for="link"><b>Link gerado:</b></label>
  <input id="link" type="text" readonly placeholder="O link aparecerá aqui..." />

  <script>
    const elPix = document.getElementById('pix');
    const elLink = document.getElementById('link');
    const btnGerar = document.getElementById('gerar');
    const btnCopiarLink = document.getElementById('copiarLink');
    const elWarn = document.getElementById('warn');

    function showWarn(msg) {
      elWarn.textContent = msg;
      elWarn.style.display = 'block';
    }

    function base64UrlEncode(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      const b64 = btoa(binary);
      return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function getPublicBaseUrl() {
      const { origin, pathname, protocol } = window.location;
      if (protocol === 'file:') return null;

      const parts = pathname.split('/').filter(Boolean);
      if (origin.endsWith('github.io') && parts.length >= 1) {
        return `${origin}/${parts[0]}/`;
      }

      const basePath = pathname.endsWith('/') ? pathname : pathname.substring(0, pathname.lastIndexOf('/') + 1);
      return `${origin}${basePath}`;
    }

    btnGerar.addEventListener('click', () => {
      elWarn.style.display = 'none';

      const pix = elPix.value.trim();
      if (!pix) {
        alert('Cole o código Pix copia e cola.');
        return;
      }

      const base = getPublicBaseUrl();
      if (!base) {
        showWarn('Você está abrindo como arquivo local (file://). Abra pelo GitHub Pages (https://...) para gerar um link público.');
        return;
      }

      const encoded = base64UrlEncode(pix);
      const url = new URL('pix.html', base);
      url.hash = encoded;

      elLink.value = url.toString();
      btnCopiarLink.disabled = false;
    });

    btnCopiarLink.addEventListener('click', async () => {
      if (!elLink.value) return;
      try {
        await navigator.clipboard.writeText(elLink.value);
        btnCopiarLink.textContent = 'Link copiado!';
        setTimeout(() => btnCopiarLink.textContent = 'Copiar link', 1200);
      } catch {
        elLink.select();
        document.execCommand('copy');
        btnCopiarLink.textContent = 'Link copiado!';
        setTimeout(() => btnCopiarLink.textContent = 'Copiar link', 1200);
      }
    });
  </script>
</body>
</html>
